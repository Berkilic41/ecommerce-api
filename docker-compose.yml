services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce-db
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: ${SA_PASSWORD:-Local_Dev_Pass_123!}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - db-data:/var/opt/mssql
      - ./Database:/sql:ro
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD:-Local_Dev_Pass_123!}" -No -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  db-init:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: ecommerce-db-init
    depends_on:
      db:
        condition: service_healthy
    environment:
      SA_PASSWORD: ${SA_PASSWORD:-Local_Dev_Pass_123!}
    volumes:
      - ./Database:/sql:ro
    entrypoint: /bin/bash -c "
      /opt/mssql-tools/bin/sqlcmd -S db -U sa -P \"$$SA_PASSWORD\" -i /sql/001_Schema.sql &&
      /opt/mssql-tools/bin/sqlcmd -S db -U sa -P \"$$SA_PASSWORD\" -i /sql/002_SeedData.sql"
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-api
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=ECommerceDb;User Id=sa;Password=${SA_PASSWORD:-Local_Dev_Pass_123!};TrustServerCertificate=true;"
      Jwt__Key: "ecommerce-super-secret-jwt-key-min-32-chars!!"
      Jwt__Issuer: ECommerceAPI
      Jwt__Audience: ECommerceClient
      Jwt__ExpiryMinutes: "15"
    ports:
      - "8080:8080"

volumes:
  db-data:
