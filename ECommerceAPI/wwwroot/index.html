<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ShopLite</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #2563eb; --primary-dark: #1d4ed8; --danger: #dc2626;
    --success: #16a34a; --bg: #f8fafc; --card: #fff;
    --border: #e2e8f0; --text: #1e293b; --muted: #64748b;
  }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
  a { color: inherit; text-decoration: none; }
  button { cursor: pointer; border: none; font: inherit; }

  /* NAV */
  nav {
    background: var(--primary); color: #fff; padding: 0 1.5rem;
    display: flex; align-items: center; gap: 1rem; height: 56px; position: sticky; top: 0; z-index: 100;
  }
  nav .brand { font-weight: 700; font-size: 1.2rem; margin-right: auto; }
  nav button {
    background: rgba(255,255,255,.15); color: #fff; padding: .4rem .9rem;
    border-radius: 6px; font-size: .875rem; transition: background .15s;
  }
  nav button:hover { background: rgba(255,255,255,.25); }
  #cart-btn { position: relative; }
  #cart-count {
    position: absolute; top: -6px; right: -6px;
    background: #ef4444; color: #fff; border-radius: 9999px;
    font-size: .7rem; width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    display: none;
  }

  /* MAIN LAYOUT */
  main { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

  /* FILTERS */
  .filters {
    display: flex; gap: .75rem; margin-bottom: 1.5rem; flex-wrap: wrap;
  }
  .filters input, .filters select {
    padding: .5rem .75rem; border: 1px solid var(--border);
    border-radius: 8px; font: inherit; flex: 1; min-width: 160px;
    background: var(--card);
  }
  .filters input:focus, .filters select:focus { outline: 2px solid var(--primary); }

  /* PRODUCT GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; transition: box-shadow .2s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }
  .card img { width: 100%; height: 180px; object-fit: cover; background: #f1f5f9; }
  .card-body { padding: 1rem; }
  .card-body h3 { font-size: .95rem; margin-bottom: .25rem; }
  .card-cat { font-size: .75rem; color: var(--muted); margin-bottom: .5rem; }
  .card-price { font-weight: 700; font-size: 1.1rem; color: var(--primary); margin-bottom: .75rem; }
  .card-stock { font-size: .75rem; color: var(--muted); margin-bottom: .5rem; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: .4rem;
         padding: .5rem 1rem; border-radius: 8px; font-size: .875rem; font-weight: 500; transition: .15s; }
  .btn-primary { background: var(--primary); color: #fff; width: 100%; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-outline { background: transparent; border: 1px solid var(--border); }
  .btn-outline:hover { background: var(--bg); }

  /* PAGINATION */
  .pagination { display: flex; gap: .5rem; justify-content: center; margin-top: 1.5rem; }
  .pagination button { padding: .4rem .85rem; border-radius: 6px; border: 1px solid var(--border); background: var(--card); }
  .pagination button.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* CART SIDEBAR */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; display: none; }
  .overlay.open { display: block; }
  .sidebar {
    position: fixed; right: 0; top: 0; bottom: 0; width: 360px; max-width: 100vw;
    background: var(--card); z-index: 201; display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform .3s;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
    font-weight: 600; font-size: 1.1rem;
  }
  .sidebar-body { flex: 1; overflow-y: auto; padding: 1rem; }
  .cart-item {
    display: flex; gap: .75rem; padding: .75rem 0;
    border-bottom: 1px solid var(--border); align-items: flex-start;
  }
  .cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; background: #f1f5f9; }
  .cart-item-info { flex: 1; }
  .cart-item-info h4 { font-size: .875rem; margin-bottom: .25rem; }
  .cart-item-info p { font-size: .8rem; color: var(--muted); }
  .qty-controls { display: flex; align-items: center; gap: .5rem; margin-top: .5rem; }
  .qty-controls button {
    width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); font-size: 1rem; display: flex; align-items: center; justify-content: center;
  }
  .sidebar-footer {
    padding: 1rem 1.25rem; border-top: 1px solid var(--border);
  }
  .sidebar-total { font-weight: 700; font-size: 1.1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 300; display: none; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: 16px; padding: 2rem; width: 100%; max-width: 420px; position: relative; }
  .modal h2 { font-size: 1.3rem; margin-bottom: 1.25rem; }
  .tabs { display: flex; gap: .5rem; margin-bottom: 1.25rem; }
  .tabs button { flex: 1; padding: .5rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); }
  .tabs button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: .875rem; font-weight: 500; margin-bottom: .35rem; }
  .form-group input, .form-group textarea {
    width: 100%; padding: .55rem .75rem; border: 1px solid var(--border);
    border-radius: 8px; font: inherit;
  }
  .form-group input:focus, .form-group textarea:focus { outline: 2px solid var(--primary); border-color: transparent; }
  .form-error { color: var(--danger); font-size: .8rem; margin-top: .25rem; }

  /* USER INDICATOR */
  .user-pill {
    background: rgba(255,255,255,.2); padding: .3rem .75rem; border-radius: 999px;
    font-size: .8rem; display: flex; align-items: center; gap: .4rem;
  }

  /* TOAST */
  #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 500; display: flex; flex-direction: column; gap: .5rem; }
  .toast {
    background: #1e293b; color: #fff; padding: .75rem 1.25rem; border-radius: 10px;
    font-size: .875rem; animation: slideIn .25s ease; max-width: 300px;
  }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }
  @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* ORDERS */
  .order-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: .75rem; }
  .order-card h3 { font-size: .95rem; margin-bottom: .25rem; }
  .order-badge {
    display: inline-block; padding: .2rem .6rem; border-radius: 999px; font-size: .75rem; font-weight: 600;
  }
  .badge-Pending { background: #fef3c7; color: #92400e; }
  .badge-Processing { background: #dbeafe; color: #1e40af; }
  .badge-Shipped { background: #ede9fe; color: #6d28d9; }
  .badge-Delivered { background: #dcfce7; color: #166534; }
  .badge-Cancelled { background: #fee2e2; color: #991b1b; }

  .empty { text-align: center; color: var(--muted); padding: 3rem 1rem; }
  .loading { text-align: center; padding: 3rem; color: var(--muted); }

  #page-orders { display: none; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <span class="brand">ShopLite</span>
  <button id="nav-shop" onclick="showPage('shop')">Shop</button>
  <button id="nav-orders" onclick="showPage('orders')" style="display:none">Orders</button>
  <span id="user-display" style="display:none" class="user-pill">
    <span id="user-name"></span>
    <button onclick="logout()" style="background:none;color:#fff;padding:0;font-size:.75rem;opacity:.8">Sign out</button>
  </span>
  <button id="login-btn" onclick="openAuth()">Sign in</button>
  <button id="cart-btn" onclick="openCart()">
    🛒 Cart <span id="cart-count">0</span>
  </button>
</nav>

<!-- MAIN -->
<main>
  <!-- SHOP PAGE -->
  <div id="page-shop">
    <div class="filters">
      <input id="search-input" type="text" placeholder="Search products…" oninput="debounceLoad()" />
      <select id="cat-select" onchange="loadProducts(1)">
        <option value="">All categories</option>
      </select>
    </div>
    <div id="product-grid" class="grid"></div>
    <div id="pagination" class="pagination"></div>
  </div>

  <!-- ORDERS PAGE -->
  <div id="page-orders">
    <h2 style="margin-bottom:1rem">My Orders</h2>
    <div id="orders-list"></div>
  </div>
</main>

<!-- CART SIDEBAR -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span>Your Cart</span>
    <button onclick="closeCart()" style="font-size:1.4rem;background:none;color:var(--muted)">×</button>
  </div>
  <div class="sidebar-body" id="cart-body"></div>
  <div class="sidebar-footer">
    <div class="sidebar-total"><span>Total</span><span id="cart-total">$0.00</span></div>
    <button class="btn btn-primary" style="width:100%" onclick="openCheckout()">Checkout</button>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal">
    <div class="tabs">
      <button id="tab-login" class="active" onclick="switchTab('login')">Sign In</button>
      <button id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN -->
    <div id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input id="login-email" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="login-password" type="password" placeholder="••••••••" />
      </div>
      <div class="form-error" id="login-error"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:.5rem" onclick="login()">Sign In</button>
    </div>

    <!-- REGISTER -->
    <div id="form-register" style="display:none">
      <div class="form-group">
        <label>Username</label>
        <input id="reg-username" type="text" placeholder="johndoe" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="reg-email" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="reg-password" type="password" placeholder="Min 6 characters" />
      </div>
      <div class="form-error" id="reg-error"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:.5rem" onclick="register()">Create Account</button>
    </div>

    <button onclick="closeAuth()" style="position:absolute;top:.75rem;right:1rem;background:none;color:var(--muted);font-size:1.4rem">×</button>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-overlay" id="checkout-modal">
  <div class="modal">
    <h2>Checkout</h2>
    <div class="form-group">
      <label>Shipping Address</label>
      <textarea id="shipping-address" rows="3" placeholder="123 Main St, City, Country"></textarea>
    </div>
    <div class="form-error" id="checkout-error"></div>
    <div style="display:flex;gap:.75rem;margin-top:.75rem">
      <button class="btn btn-outline" style="flex:1" onclick="closeCheckout()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="placeOrder()">Place Order</button>
    </div>
    <button onclick="closeCheckout()" style="position:absolute;top:.75rem;right:1rem;background:none;color:var(--muted);font-size:1.4rem">×</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script>
const API = '/api';
let accessToken = localStorage.getItem('accessToken') || null;
let refreshToken = localStorage.getItem('refreshToken') || null;
let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
let cart = { id: 0, items: [], total: 0 };
let categories = [];
let currentPage = 1;
let totalPages = 1;
let debounceTimer = null;

// ── HTTP helpers ───────────────────────────────────────────────────────────────

async function request(method, path, body, auth = false) {
  const headers = { 'Content-Type': 'application/json' };
  if (auth && accessToken) headers['Authorization'] = `Bearer ${accessToken}`;

  const res = await fetch(API + path, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined
  });

  if (res.status === 401 && auth && refreshToken) {
    const ok = await tryRefresh();
    if (ok) {
      headers['Authorization'] = `Bearer ${accessToken}`;
      const res2 = await fetch(API + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
      return res2.ok ? res2.json().catch(() => null) : Promise.reject(await res2.json().catch(() => ({ error: 'Request failed' })));
    }
    logout();
    return;
  }

  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'Request failed' }));
    throw new Error(err.error || 'Request failed');
  }
  if (res.status === 204) return null;
  return res.json().catch(() => null);
}

async function tryRefresh() {
  try {
    const data = await fetch(API + '/auth/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refreshToken })
    }).then(r => r.json());
    if (data.accessToken) { saveAuth(data); return true; }
  } catch { }
  return false;
}

const get = (p, auth) => request('GET', p, null, auth);
const post = (p, b, auth) => request('POST', p, b, auth);
const put = (p, b, auth) => request('PUT', p, b, auth);
const del = (p, auth) => request('DELETE', p, null, auth);

// ── Auth ───────────────────────────────────────────────────────────────────────

function saveAuth(data) {
  accessToken = data.accessToken;
  refreshToken = data.refreshToken;
  currentUser = { username: data.username, email: data.email, role: data.role };
  localStorage.setItem('accessToken', accessToken);
  localStorage.setItem('refreshToken', refreshToken);
  localStorage.setItem('currentUser', JSON.stringify(currentUser));
}

function clearAuth() {
  accessToken = refreshToken = currentUser = null;
  localStorage.removeItem('accessToken');
  localStorage.removeItem('refreshToken');
  localStorage.removeItem('currentUser');
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  document.getElementById('login-error').textContent = '';
  try {
    const data = await post('/auth/login', { email, password });
    saveAuth(data);
    closeAuth();
    onAuthChange();
    toast('Welcome back, ' + data.username + '!', 'success');
    loadCart();
  } catch (e) {
    document.getElementById('login-error').textContent = e.message;
  }
}

async function register() {
  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  document.getElementById('reg-error').textContent = '';
  try {
    const data = await post('/auth/register', { username, email, password });
    saveAuth(data);
    closeAuth();
    onAuthChange();
    toast('Account created! Welcome, ' + data.username + '!', 'success');
    loadCart();
  } catch (e) {
    document.getElementById('reg-error').textContent = e.message;
  }
}

async function logout() {
  if (refreshToken) {
    try { await post('/auth/logout', { refreshToken }, true); } catch { }
  }
  clearAuth();
  cart = { id: 0, items: [], total: 0 };
  onAuthChange();
  renderCart();
  toast('Signed out.');
}

function onAuthChange() {
  const loggedIn = !!currentUser;
  document.getElementById('login-btn').style.display = loggedIn ? 'none' : '';
  document.getElementById('user-display').style.display = loggedIn ? '' : 'none';
  document.getElementById('nav-orders').style.display = loggedIn ? '' : 'none';
  if (loggedIn) document.getElementById('user-name').textContent = currentUser.username;
  if (!loggedIn) showPage('shop');
}

// ── Pages ─────────────────────────────────────────────────────────────────────

function showPage(page) {
  document.getElementById('page-shop').style.display = page === 'shop' ? '' : 'none';
  document.getElementById('page-orders').style.display = page === 'orders' ? '' : 'none';
  if (page === 'orders') loadOrders();
}

// ── Products ──────────────────────────────────────────────────────────────────

async function loadCategories() {
  try {
    categories = await get('/categories');
    const sel = document.getElementById('cat-select');
    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id; opt.textContent = c.name;
      sel.appendChild(opt);
    });
  } catch { }
}

function debounceLoad() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => loadProducts(1), 350);
}

async function loadProducts(page = 1) {
  currentPage = page;
  const search = document.getElementById('search-input').value.trim();
  const catId = document.getElementById('cat-select').value;
  let url = `/products?page=${page}&pageSize=8`;
  if (search) url += `&search=${encodeURIComponent(search)}`;
  if (catId) url += `&categoryId=${catId}`;

  const grid = document.getElementById('product-grid');
  grid.innerHTML = '<div class="loading">Loading…</div>';

  try {
    const data = await get(url);
    totalPages = Math.ceil(data.totalCount / data.pageSize) || 1;
    renderProducts(data.products);
    renderPagination();
  } catch {
    grid.innerHTML = '<div class="empty">Failed to load products.</div>';
  }
}

function renderProducts(products) {
  const grid = document.getElementById('product-grid');
  if (!products.length) {
    grid.innerHTML = '<div class="empty">No products found.</div>';
    return;
  }
  grid.innerHTML = products.map(p => `
    <div class="card">
      <img src="${p.imageUrl || 'https://placehold.co/300x180?text=No+Image'}" alt="${escHtml(p.name)}" loading="lazy" />
      <div class="card-body">
        <h3>${escHtml(p.name)}</h3>
        <p class="card-cat">${escHtml(p.categoryName || '')}</p>
        <p class="card-price">$${p.price.toFixed(2)}</p>
        <p class="card-stock">${p.stockQuantity > 0 ? p.stockQuantity + ' in stock' : '<span style="color:var(--danger)">Out of stock</span>'}</p>
        ${p.stockQuantity > 0
          ? `<button class="btn btn-primary" onclick="addToCart(${p.id})">Add to cart</button>`
          : `<button class="btn btn-outline" disabled>Out of stock</button>`}
      </div>
    </div>`).join('');
}

function renderPagination() {
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  let html = '';
  if (currentPage > 1) html += `<button onclick="loadProducts(${currentPage - 1})">‹ Prev</button>`;
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="loadProducts(${i})">${i}</button>`;
  }
  if (currentPage < totalPages) html += `<button onclick="loadProducts(${currentPage + 1})">Next ›</button>`;
  pag.innerHTML = html;
}

// ── Cart ──────────────────────────────────────────────────────────────────────

async function loadCart() {
  if (!currentUser) return;
  try {
    cart = await get('/cart', true);
    renderCart();
  } catch { }
}

function renderCart() {
  const count = cart.items ? cart.items.reduce((s, i) => s + i.quantity, 0) : 0;
  const countEl = document.getElementById('cart-count');
  countEl.textContent = count;
  countEl.style.display = count > 0 ? 'flex' : 'none';

  const body = document.getElementById('cart-body');
  const total = cart.total || 0;
  document.getElementById('cart-total').textContent = '$' + total.toFixed(2);

  if (!cart.items || !cart.items.length) {
    body.innerHTML = '<div class="empty">Your cart is empty.</div>';
    return;
  }

  body.innerHTML = cart.items.map(i => `
    <div class="cart-item">
      <img src="${escHtml(i.productImageUrl || 'https://placehold.co/60x60?text=?')}" alt="${escHtml(i.productName)}" />
      <div class="cart-item-info">
        <h4>${escHtml(i.productName)}</h4>
        <p>$${i.productPrice.toFixed(2)} each</p>
        <div class="qty-controls">
          <button onclick="updateQty(${i.productId}, ${i.quantity - 1})">−</button>
          <span>${i.quantity}</span>
          <button onclick="updateQty(${i.productId}, ${i.quantity + 1})">+</button>
        </div>
      </div>
      <div style="text-align:right">
        <p style="font-weight:600">$${i.subtotal.toFixed(2)}</p>
        <button class="btn btn-danger" style="padding:.3rem .6rem;margin-top:.4rem;font-size:.75rem" onclick="removeFromCart(${i.productId})">✕</button>
      </div>
    </div>`).join('');
}

async function addToCart(productId) {
  if (!currentUser) { openAuth(); return; }
  try {
    cart = await post('/cart/items', { productId, quantity: 1 }, true);
    renderCart();
    toast('Added to cart!', 'success');
  } catch (e) { toast(e.message, 'error'); }
}

async function updateQty(productId, newQty) {
  if (newQty < 1) { removeFromCart(productId); return; }
  try {
    cart = await put(`/cart/items/${productId}`, { quantity: newQty }, true);
    renderCart();
  } catch (e) { toast(e.message, 'error'); }
}

async function removeFromCart(productId) {
  try {
    cart = await request('DELETE', `/cart/items/${productId}`, null, true);
    renderCart();
  } catch (e) { toast(e.message, 'error'); }
}

function openCart() {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sidebar').classList.add('open');
  if (currentUser) loadCart();
}

function closeCart() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sidebar').classList.remove('open');
}

// ── Checkout ──────────────────────────────────────────────────────────────────

function openCheckout() {
  if (!currentUser) { closeCart(); openAuth(); return; }
  if (!cart.items || !cart.items.length) { toast('Your cart is empty.', 'error'); return; }
  closeCart();
  document.getElementById('checkout-modal').classList.add('open');
}

function closeCheckout() {
  document.getElementById('checkout-modal').classList.remove('open');
  document.getElementById('checkout-error').textContent = '';
}

async function placeOrder() {
  const address = document.getElementById('shipping-address').value.trim();
  document.getElementById('checkout-error').textContent = '';
  if (!address) { document.getElementById('checkout-error').textContent = 'Shipping address is required.'; return; }
  try {
    await post('/orders', { shippingAddress: address }, true);
    cart = { id: 0, items: [], total: 0 };
    renderCart();
    closeCheckout();
    toast('Order placed successfully!', 'success');
    showPage('orders');
  } catch (e) {
    document.getElementById('checkout-error').textContent = e.message;
  }
}

// ── Orders ────────────────────────────────────────────────────────────────────

async function loadOrders() {
  const list = document.getElementById('orders-list');
  list.innerHTML = '<div class="loading">Loading…</div>';
  try {
    const orders = await get('/orders', true);
    if (!orders.length) { list.innerHTML = '<div class="empty">No orders yet.</div>'; return; }
    list.innerHTML = orders.map(o => `
      <div class="order-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem">
          <div>
            <h3>Order #${o.id}</h3>
            <p style="font-size:.8rem;color:var(--muted)">${new Date(o.createdAt).toLocaleDateString()}</p>
          </div>
          <span class="order-badge badge-${o.status}">${o.status}</span>
        </div>
        <p style="font-size:.875rem;color:var(--muted);margin-bottom:.5rem">📦 ${escHtml(o.shippingAddress)}</p>
        <div style="font-size:.85rem;margin-bottom:.5rem">
          ${o.items.map(i => `<div style="display:flex;justify-content:space-between"><span>${escHtml(i.productName)} × ${i.quantity}</span><span>$${i.subtotal.toFixed(2)}</span></div>`).join('')}
        </div>
        <div style="font-weight:700;text-align:right">Total: $${o.totalAmount.toFixed(2)}</div>
      </div>`).join('');
  } catch { list.innerHTML = '<div class="empty">Failed to load orders.</div>'; }
}

// ── Auth modal ────────────────────────────────────────────────────────────────

function openAuth() { document.getElementById('auth-modal').classList.add('open'); }
function closeAuth() { document.getElementById('auth-modal').classList.remove('open'); }

function switchTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

document.getElementById('auth-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeAuth(); });
document.getElementById('checkout-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeCheckout(); });

// ── Toast ─────────────────────────────────────────────────────────────────────

function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Utils ─────────────────────────────────────────────────────────────────────

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────────

onAuthChange();
loadCategories();
loadProducts();
if (currentUser) loadCart();
</script>
</body>
